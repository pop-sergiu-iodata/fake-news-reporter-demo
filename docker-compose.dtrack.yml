services:
  dtrack-apiserver:
    image: dependencytrack/apiserver:latest
    environment:
      ALPINE_DATABASE_MODE: internal
    volumes:
      - dtrack-data:/data
    ports:
      - "8081:8080"
    restart: unless-stopped

  dtrack-frontend:
    image: dependencytrack/frontend:latest
    environment:
      API_BASE_URL: http://localhost:8081
    ports:
      - "8082:8080"
    depends_on:
      - dtrack-apiserver
    restart: unless-stopped

volumes:
  dtrack-data: