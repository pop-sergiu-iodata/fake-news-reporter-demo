spring:
  application:
    name: fake-news-reporter
  
  profiles:
    active: ${SPRING_PROFILE:local}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  thymeleaf:
    cache: false
    
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: user
    password: password

gemini:
  api:
    key: ${GOOGLE_API_KEY:}
    
server:
  port: 8080

logging:
  level:
    com.automatica: INFO
    org.springframework.security: INFO

python:
  path: ${PYTHON_PATH:ai_agent/.venv/Scripts/python.exe}
  script: ${PYTHON_SCRIPT:ai_agent/TestAgain.py}

local:
  ai:
    script: ${LOCAL_AI_SCRIPT:local_ai_agent/LocalAIAgent.py}
